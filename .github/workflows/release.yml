name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract and validate version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VER="${GITHUB_REF_NAME#v}"
            CODE_VER=$(grep -E '#define SPLASH_VERSION_STR' firmware/src/config.h | sed 's/.*"v\([0-9][0-9.]*\).*/\1/')
            echo "Tag version:  $TAG_VER"
            echo "Code version: $CODE_VER"
            if [[ "$TAG_VER" != "$CODE_VER" ]]; then
              echo "ERROR: Tag version ($TAG_VER) does not match config.h ($CODE_VER)"
              exit 1
            fi
            echo "version=$TAG_VER" >> "$GITHUB_OUTPUT"
          else
            echo "No tag — skipping version validation"
          fi

  build-firmware:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install "click<8.2" platformio

      - name: Build CYD firmware
        run: pio run -e cyd-2432s028r
        working-directory: firmware

      - name: Build LILYGO firmware
        run: pio run -e lilygo-t-display-s3
        working-directory: firmware

      - name: Build Freenove S3 firmware
        run: pio run -e freenove-s3-28c
        working-directory: firmware

      - name: Package firmware artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          mkdir -p releases

          for board_env in cyd-2432s028r lilygo-t-display-s3 freenove-s3-28c; do
            case $board_env in
              cyd-2432s028r)        NAME="cyd" ;;
              lilygo-t-display-s3)  NAME="lilygo" ;;
              freenove-s3-28c)      NAME="freenove-s3" ;;
            esac

            DIR="releases/pixel-agents-${NAME}-v${VERSION}"
            mkdir -p "$DIR"
            cp firmware/.pio/build/${board_env}/firmware.bin "$DIR/"
            cp firmware/.pio/build/${board_env}/bootloader.bin "$DIR/"
            cp firmware/.pio/build/${board_env}/partitions.bin "$DIR/"
            find ~/.platformio -name boot_app0.bin -path "*/espressif32/*" | head -1 | xargs -I{} cp {} "$DIR/"
            (cd releases && zip -r "pixel-agents-${NAME}-v${VERSION}.zip" "pixel-agents-${NAME}-v${VERSION}/")
          done

      - name: Upload firmware artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: firmware-releases
          path: releases/*.zip

  build-macos:
    needs: validate-version
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Generate Xcode project
        working-directory: macos/PixelAgents
        run: xcodegen generate

      - name: Build and sign
        working-directory: macos/PixelAgents
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ needs.validate-version.outputs.version || '0.0.0' }}
        run: |
          xcodebuild -project PixelAgents.xcodeproj \
            -scheme PixelAgents \
            -configuration Release \
            -derivedDataPath .build \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Developer ID Application" \
            "DEVELOPMENT_TEAM=$APPLE_TEAM_ID" \
            "MARKETING_VERSION=$VERSION"

      - name: Create DMG
        working-directory: macos/PixelAgents
        env:
          VERSION: ${{ needs.validate-version.outputs.version || '0.0.0' }}
        run: |
          mkdir -p dmg_staging
          cp -R .build/Build/Products/Release/PixelAgents.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "Pixel Agents" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            "PixelAgents-v${VERSION}.dmg"

      - name: Notarize DMG
        working-directory: macos/PixelAgents
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ needs.validate-version.outputs.version || '0.0.0' }}
        run: |
          xcrun notarytool submit "PixelAgents-v${VERSION}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "PixelAgents-v${VERSION}.dmg"

      - name: Upload macOS artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: macos/PixelAgents/PixelAgents-v*.dmg

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true

  release:
    needs: [validate-version, build-firmware, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-releases
          path: releases/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: releases/

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          BODY=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p;}" CHANGELOG.md)
          echo "$BODY" > /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/*
          body_path: /tmp/release_body.md
