name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract and validate version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VER="${GITHUB_REF_NAME#v}"
            CODE_VER=$(grep -E '#define SPLASH_VERSION_STR' firmware/src/config.h | sed 's/.*"v\([0-9][0-9.]*\).*/\1/')
            echo "Tag version:  $TAG_VER"
            echo "Code version: $CODE_VER"
            if [[ "$TAG_VER" != "$CODE_VER" ]]; then
              echo "ERROR: Tag version ($TAG_VER) does not match config.h ($CODE_VER)"
              exit 1
            fi
            echo "version=$TAG_VER" >> "$GITHUB_OUTPUT"
          else
            echo "No tag — skipping version validation"
          fi

  build-firmware:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install "click<8.2" platformio

      - name: Build CYD firmware
        run: pio run -e cyd-2432s028r
        working-directory: firmware

      - name: Build LILYGO firmware
        run: pio run -e lilygo-t-display-s3
        working-directory: firmware

      - name: Build Freenove S3 firmware
        run: pio run -e freenove-s3-28c
        working-directory: firmware

      - name: Package firmware artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          mkdir -p releases

          for board_env in cyd-2432s028r lilygo-t-display-s3 freenove-s3-28c; do
            case $board_env in
              cyd-2432s028r)        NAME="cyd" ;;
              lilygo-t-display-s3)  NAME="lilygo" ;;
              freenove-s3-28c)      NAME="freenove-s3" ;;
            esac

            DIR="releases/pixel-agents-${NAME}-v${VERSION}"
            mkdir -p "$DIR"
            cp firmware/.pio/build/${board_env}/firmware.bin "$DIR/"
            cp firmware/.pio/build/${board_env}/bootloader.bin "$DIR/"
            cp firmware/.pio/build/${board_env}/partitions.bin "$DIR/"
            find ~/.platformio -name boot_app0.bin -path "*/espressif32/*" | head -1 | xargs -I{} cp {} "$DIR/"
            (cd releases && zip -r "pixel-agents-${NAME}-v${VERSION}.zip" "pixel-agents-${NAME}-v${VERSION}/")
          done

      - name: Upload firmware artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: firmware-releases
          path: releases/*.zip

  build-macos:
    needs: validate-version
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Generate Xcode project
        working-directory: macos/PixelAgents
        run: xcodegen generate

      - name: Build and sign
        working-directory: macos/PixelAgents
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ needs.validate-version.outputs.version || '0.0.0' }}
        run: |
          xcodebuild -project PixelAgents.xcodeproj \
            -scheme PixelAgents \
            -configuration Release \
            -derivedDataPath .build \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Developer ID Application" \
            "DEVELOPMENT_TEAM=$APPLE_TEAM_ID" \
            "OTHER_CODE_SIGN_FLAGS=--timestamp" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            "MARKETING_VERSION=$VERSION"

      - name: Sign embedded Sparkle framework
        working-directory: macos/PixelAgents
        run: |
          FWPATH=".build/Build/Products/Release/PixelAgents.app/Contents/Frameworks/Sparkle.framework"
          IDENTITY="Developer ID Application"
          codesign --force --options runtime --preserve-metadata=entitlements \
            --sign "$IDENTITY" --timestamp \
            "$FWPATH/Versions/B/XPCServices/Downloader.xpc"
          codesign --force --options runtime --preserve-metadata=entitlements \
            --sign "$IDENTITY" --timestamp \
            "$FWPATH/Versions/B/XPCServices/Installer.xpc"
          codesign --force --options runtime --preserve-metadata=entitlements \
            --sign "$IDENTITY" --timestamp \
            "$FWPATH/Versions/B/Updater.app"
          codesign --force --options runtime --preserve-metadata=entitlements \
            --sign "$IDENTITY" --timestamp \
            "$FWPATH/Versions/B/Autoupdate"
          codesign --force --options runtime \
            --sign "$IDENTITY" --timestamp \
            "$FWPATH"

      - name: Re-sign app bundle
        working-directory: macos/PixelAgents
        run: |
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application" \
            --entitlements PixelAgents/PixelAgents.entitlements \
            ".build/Build/Products/Release/PixelAgents.app"
          codesign --verify --deep --strict ".build/Build/Products/Release/PixelAgents.app"

      - name: Create DMG
        working-directory: macos/PixelAgents
        env:
          VERSION: ${{ needs.validate-version.outputs.version || '0.0.0' }}
        run: |
          mkdir -p dmg_staging
          cp -R .build/Build/Products/Release/PixelAgents.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "Pixel Agents" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            "PixelAgents-v${VERSION}.dmg"

      - name: Notarize DMG
        working-directory: macos/PixelAgents
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ needs.validate-version.outputs.version || '0.0.0' }}
        run: |
          # Submit and wait, capturing output for the submission ID
          SUBMIT_OUT=$(xcrun notarytool submit "PixelAgents-v${VERSION}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1) || true
          echo "$SUBMIT_OUT"

          # Extract submission ID and fetch detailed log on failure
          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | grep -m1 "id:" | awk '{print $2}')
          if ! echo "$SUBMIT_OUT" | grep -q "status: Accepted"; then
            echo "--- Notarization Log ---"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" 2>&1 || true
            exit 1
          fi

          xcrun stapler staple "PixelAgents-v${VERSION}.dmg"

      - name: Upload macOS artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: macos/PixelAgents/PixelAgents-v*.dmg

      - name: Sign DMG and update appcast
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: macos/PixelAgents
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ needs.validate-version.outputs.version }}
        run: |
          set -e

          # Download Sparkle CLI tools
          SPARKLE_VERSION="2.6.0"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle-tools
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle-tools

          # Sign DMG with EdDSA
          DMG_PATH="PixelAgents-v${VERSION}.dmg"
          DMG_URL="https://github.com/underactive/pixel-agents-esp32/releases/download/v${VERSION}/PixelAgents-v${VERSION}.dmg"

          # sign_update outputs: sparkle:edSignature="..." length="..."
          # Extract just the signature value and use stat for the file size
          SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | /tmp/sparkle-tools/bin/sign_update --ed-key-file - "$DMG_PATH")
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          DMG_SIZE=$(stat -f%z "$DMG_PATH")

          # Build appcast item XML
          ITEM=$(cat <<XMLEOF
            <item>
                <title>Version ${VERSION}</title>
                <pubDate>$(date -R)</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure url="${DMG_URL}" length="${DMG_SIZE}" type="application/octet-stream" sparkle:edSignature="${ED_SIGNATURE}" />
            </item>
          XMLEOF
          )

          # Checkout or create gh-pages branch
          cd "$GITHUB_WORKSPACE"
          git fetch origin gh-pages 2>/dev/null || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            git worktree add --detach /tmp/gh-pages
            cd /tmp/gh-pages && git checkout --orphan gh-pages && git rm -rf . 2>/dev/null || true
            cd "$GITHUB_WORKSPACE"
          fi

          # Create or update appcast.xml (replaces existing entry for same version)
          python3 - "$ITEM" "$VERSION" /tmp/gh-pages/appcast.xml <<'PYEOF'
          import sys, os, re
          item, version, path = sys.argv[1], sys.argv[2], sys.argv[3]
          if os.path.exists(path):
              appcast = open(path).read()
              # Remove any existing items for this version
              appcast = re.sub(
                  r'\s*<item>.*?<sparkle:version>' + re.escape(version) + r'</sparkle:version>.*?</item>',
                  '', appcast, flags=re.DOTALL)
              # Insert new item before </channel>
              appcast = appcast.replace('</channel>', item + '\n        </channel>')
          else:
              appcast = f'''<?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
              <channel>
                  <title>Pixel Agents</title>
          {item}
              </channel>
          </rss>'''
          open(path, 'w').write(appcast)
          PYEOF

          # Commit and push
          cd /tmp/gh-pages
          git add appcast.xml
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "Update appcast for v${VERSION}"
          git push origin HEAD:gh-pages

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true

  release:
    needs: [validate-version, build-firmware, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-releases
          path: releases/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: releases/

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          BODY=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p;}" CHANGELOG.md)
          echo "$BODY" > /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/*
          body_path: /tmp/release_body.md
