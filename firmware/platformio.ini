[env:lilygo-t-display-s3]
platform = espressif32
board = lilygo-t-display-s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_MISO=-1
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=9
    -DTFT_BL=14
    -DSPI_FREQUENCY=40000000
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1

lib_deps =
    bodmer/TFT_eSPI@^2.5.0

board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

; ── ESP32-2432S028R "Cheap Yellow Display" (CYD) ────────
; 2.8" ILI9341 320x240, resistive touch (XPT2046), no PSRAM
[env:cyd-2432s028r]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800

build_flags =
    -DBOARD_CYD=1
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DSPI_FREQUENCY=40000000
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
