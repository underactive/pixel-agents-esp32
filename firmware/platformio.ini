build_flags =
    -DUSER_SETUP_LOADED=1
    -DUSE_FSPI_PORT=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_MISO=8
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=9
    -DTFT_BL=14
    -DSPI_FREQUENCY=40000000
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1

lib_deps =
    bodmer/TFT_eSPI@^2.5.0

board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
