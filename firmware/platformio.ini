; ── ESP32-2432S028R "Cheap Yellow Display" (CYD) ────────
; 2.8" ILI9341 320x240, resistive touch (XPT2046), no PSRAM
[env:cyd-2432s028r]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800

build_flags =
    -DBOARD_CYD=1
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=10000000
    -DHAS_TOUCH=1
    -DHAS_BLE=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    h2zero/NimBLE-Arduino@^2.1.0

; ── Freenove ESP32-S3 2.8" (fnk0104) ─────────────────────
; 2.8" ILI9341 320x240, capacitive touch (FT6336G), PSRAM
; ES8311 audio codec + speaker amp, WS2812B NeoPixel LED
[env:freenove-s3-28c]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DBOARD_CYD_S3=1
    -DUSER_SETUP_LOADED=1
    -DUSE_FSPI_PORT=1
    -DILI9341_DRIVER=1
    -DTFT_INVERSION_ON=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=13
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=46
    -DTFT_RST=-1
    -DTFT_BL=45
    -DSPI_FREQUENCY=40000000
    -DHAS_TOUCH=1
    -DCAP_TOUCH=1
    -DHAS_BLE=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    h2zero/NimBLE-Arduino@^2.1.0
    adafruit/Adafruit NeoPixel@^1.12.0

board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB

; ── LILYGO T-Display S3 ────────────────────────────────
; 1.9" ST7789 320x170, no touch, PSRAM
[env:lilygo-t-display-s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board = lilygo-t-display-s3
