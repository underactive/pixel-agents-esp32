name: PixelAgents
options:
  bundleIdPrefix: com.pixelagents
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  PixelAgents:
    type: application
    platform: macOS
    sources:
      - path: PixelAgents
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pixelagents.companion
        PRODUCT_NAME: PixelAgents
        INFOPLIST_FILE: PixelAgents/Info.plist
        CODE_SIGN_ENTITLEMENTS: PixelAgents/PixelAgents.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    entitlements:
      path: PixelAgents/PixelAgents.entitlements

  PixelAgentsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PixelAgentsTests
    dependencies:
      - target: PixelAgents
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pixelagents.companion.tests
        GENERATE_INFOPLIST_FILE: YES
