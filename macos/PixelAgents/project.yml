name: PixelAgents
options:
  bundleIdPrefix: com.pixelagents
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  PixelAgents:
    type: application
    platform: macOS
    sources:
      - path: PixelAgents
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pixelagents.companion
        PRODUCT_NAME: "Pixel Agents"
        PRODUCT_MODULE_NAME: PixelAgents
        INFOPLIST_FILE: PixelAgents/Info.plist
        CODE_SIGN_ENTITLEMENTS: PixelAgents/PixelAgents.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.11.5"
        CURRENT_PROJECT_VERSION: "0.11.5"
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    dependencies:
      - package: Sparkle
    entitlements:
      path: PixelAgents/PixelAgents.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.pixelagents.companion

  PixelAgentsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PixelAgentsTests
    dependencies:
      - target: PixelAgents
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pixelagents.companion.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Pixel Agents.app/Contents/MacOS/Pixel Agents"
        BUNDLE_LOADER: "$(TEST_HOST)"
